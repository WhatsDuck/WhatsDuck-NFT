<!DOCTYPE html>
<html>
<head>
    <title>WhatsDuck NFT</title>

    <style>

    body{
        margin:0;
        font-family:Arial, Helvetica, sans-serif;
        color:white;
        text-align:center;

        background-image:url("WhatsDuck-mages-home.png");
        background-size: 100% 100%;
        background-position: center;
        background-repeat: no-repeat;
        background-attachment: fixed;

        min-height:100vh;

        position:relative;
}

    body::before{

        content:"";

        position:fixed;

        top:0;
        left:0;

        width:100%;
        height:100%;

        background:rgba(0,0,0,.55);

        z-index:-1;

    }

    h1{

        margin-top:90px;

        font-size:72px;

        font-weight:bold;

        text-shadow:0 0 20px rgba(0,0,0,.6);

    }

        p {

            font-size:28px;
            color:#ececec;

        }

        .box {

            margin-top:70px;
            
        }

        .btn{

            display:inline-block;
        
            padding:18px 45px;

            background:#22c55e;

            color:white;

            text-decoration:none;

            border-radius:12px;

            font-size:22px;

            font-weight:bold;

            transition:.3s;

            box-shadow:0 8px 25px rgba(34,197,94,.35);

        }

        .btn:hover{

            background:#16a34a;

            transform:translateY(-5px);

        }

        /* COLLECTION GRID */
        .collection {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
            max-width: 900px;
            margin: 40px auto;
            padding: 0 20px;
        }

        /* CARD NFT */
        .card {
            background: #1e293b;
            border-radius: 12px;
            padding: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            transition: transform 0.2s ease;
        }

        .card:hover {
            transform: translateY(-5px);
        }

        .card img {
            width: 100%;
            border-radius: 10px;
        }

        .card h3 {
            margin: 10px 0 5px;
        }

        .card p {
            font-size: 14px;
            color: #cbd5e1;
        }

        /* ROADMAP */
        .roadmap {

            width:650px;

            max-width:90%;

            margin:40px auto;

            padding:40px;

            border-radius:20px;

            background:rgba(255,255,255,.08);

            border:1px solid rgba(255,255,255,.15);

            backdrop-filter:blur(10px);

            box-shadow:0 10px 40px rgba(0,0,0,.35);

        }

        .roadmap p{

            font-size:24px;

            margin:18px 0;

        }

    </style>
</head>

<body>

    <h1>🦆 WhatsDuck NFT</h1>
    <p>Welcome to the official collection</p>

    <div class="box">
        <a class="btn" href="collection.html">View Collection</a>
    </div>

    <h2>Roadmap</h2>
    <div class="roadmap">
        <p>Phase 1: Launch</p>
        <p>Phase 2: Community Growth</p>
        <p>Phase 3: Utility Expansion</p>
    </div>

</body>
</html>
