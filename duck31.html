<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>WhatsDuck #31</title>

<style>

body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#0f172a;
    color:white;
}

.container{

    max-width:1100px;

    margin:auto;

    padding:60px 20px;

}

.title{

    text-align:center;

    margin-bottom:50px;

}

.title h1{

    margin:0;

    font-size:48px;

}

.title p{

    color:#cbd5e1;

}

/* DETAIL */

.nft-detail{

    display:grid;

    grid-template-columns:
    1fr 1fr;

    gap:50px;

    align-items:center;

}

.nft-image{

    background:#1e293b;

    border-radius:20px;

    padding:20px;

    box-shadow:
    0 15px 35px rgba(0,0,0,.35);

}

.nft-image img{

    width:100%;

    border-radius:12px;

    display:block;

}

.nft-info{

    background:#1e293b;

    border-radius:20px;

    padding:30px;

    box-shadow:
    0 15px 35px rgba(0,0,0,.35);

}

.nft-info h2{

    margin-top:0;

    margin-bottom:25px;

}

.info-row{

    display:flex;

    justify-content:space-between;

    padding:12px 0;

    border-bottom:
    1px solid rgba(255,255,255,.08);

}

.label{

    color:#94a3b8;

}

.value{

    font-weight:bold;

}

.btn{

    display:inline-block;

    margin-top:30px;

    margin-right:30px;
    
    padding:12px 24px;

    background:#22c55e;

    color:white;

    text-decoration:none;

    border-radius:8px;

}

.btn:hover

    /* tombol hijau */
    .btn.back{
    background:#22c55e;
}

    .btn.back:hover{
    background:#16a34a;
}

    /* tombol merah */
    .btn.opensea{
    background:#ef4444;
}

    .btn.opensea:hover{
    background:#dc2626;

}

/* MOBILE */

@media(max-width:768px){

.nft-detail{

grid-template-columns:1fr;

}

.title h1{

font-size:34px;

}

}

</style>

</head>

<body>

<div class="container">

    <div class="title">

        <h1>WhatsDuck #31</h1>

        <p>New Friend from Session 02</p>

    </div>

    <div class="nft-detail">

        <div class="nft-image">

            <img src="Duck31.png" alt="WhatsDuck #31">

        </div>

        <div class="nft-info">

            <h2>NFT Details</h2>

            <div class="info-row">
                <span class="label">Name</span>
                <span class="value">WhatsDuck #31</span>
            </div>

            <div class="info-row">
                <span class="label">Session</span>
                <span class="value">02</span>
            </div>

            <div class="info-row">
                <span class="label">Rarity</span>
                <span class="value">Legendary</span>
            </div>

            <div class="info-row">
                <span class="label">Species</span>
                <span class="value">Duck</span>
            </div>

            <div class="info-row">
                <span class="label">Edition</span>
                <span class="value">1 / 1</span>
            </div>

            <a class="btn opensea" href="https://opensea.io/item/base/0x86c995abc81d24aaab3b3e77fad3c52097a7df9b/27">
                →  Collect on OpenSea
            </a>

            <a class="btn" href="session02.html">
                ← Back to Session
            </a>

        </div>

    </div>

</div>

</body>

</html>
